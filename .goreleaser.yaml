# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: git-get

builds:
  - main: ./
    binary: git-get
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  use: github
  groups:
    - title: "Features"
      regexp: "^feat(\\([^\\)]+\\))?!?:.*$"
      order: 0
    - title: "Bug Fixes"
      regexp: "^fix(\\([^\\)]+\\))?!?:.*$"
      order: 1
    - title: "Other"
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"

release:
  prerelease: auto
  name_template: "{{ .ProjectName }} {{ .Version }}"
